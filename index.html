<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格スマホ・コードエディタ</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: #1e1e24; color: #fff; }

        /* ===== 共通ヘッダー ===== */
        header { background: #2d2d34; padding: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; border-bottom: 1px solid #3d3d45; flex-wrap: wrap; }
        .hbtn { border: none; padding: 8px 12px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-blue:active { background: #004085; }
        .btn-green { background: #28a745; color: #fff; }
        .btn-green:active { background: #19692c; }
        .btn-gray { background: #3d3d45; color: #ddd; }
        .btn-gray:active { background: #55555f; }
        .btn-red { background: #dc3545; color: #fff; }
        .btn-red:active { background: #a71d2a; }

        /* ===== ホーム画面 ===== */
        #home-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .home-header { background: #2d2d34; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3d3d45; }
        .home-header h1 { margin: 0; font-size: 18px; }
        .project-list { flex: 1; overflow-y: auto; padding: 14px; }
        .project-card { background: #2d2d34; border: 1px solid #3d3d45; border-radius: 10px; padding: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .project-info { flex: 1; min-width: 0; cursor: pointer; }
        .project-name { font-size: 16px; font-weight: bold; margin: 0 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .project-date { font-size: 12px; color: #999; margin: 0; }
        .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .empty-msg { text-align: center; color: #888; margin-top: 60px; font-size: 14px; line-height: 1.8; }

        /* ===== エディタ画面 ===== */
        #editor-screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-container { display: flex; background: #1e1e24; padding: 4px; border-radius: 8px; flex: 1; max-width: 200px; }
        .tab-btn { flex: 1; background: transparent; color: #aaa; border: none; padding: 8px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: #3d3d45; color: #fff; }
        .project-title-bar { background: #26262c; padding: 5px 12px; font-size: 12px; color: #9aa; border-bottom: 1px solid #3d3d45; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .content { flex: 1; position: relative; overflow: hidden; }
        .editors, iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        .editors.active { display: flex; flex-direction: column; }
        iframe.active { display: block; background: #fff; }
        .CodeMirror { flex: 1; height: 100%; font-family: 'Fira Code', monospace; font-size: 14px; }

        /* ===== アプリ内ダイアログ（alert/confirm/promptの代わり） ===== */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        #modal-overlay.show { display: flex; }
        .modal-box { background: #2d2d34; border: 1px solid #4d4d55; border-radius: 12px; padding: 20px; width: 100%; max-width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .modal-msg { margin: 0 0 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        #modal-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #4d4d55; background: #1e1e24; color: #fff; font-size: 14px; margin-bottom: 14px; display: none; }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btns .hbtn { padding: 9px 18px; }
    </style>
</head>
<body>

    <!-- ===== ホーム画面 ===== -->
    <div id="home-screen">
        <div class="home-header">
            <h1>📁 マイプロジェクト</h1>
            <button class="hbtn btn-green" onclick="createNewProject()">＋ 新規作成</button>
        </div>
        <div id="project-list" class="project-list"></div>
    </div>

    <!-- ===== エディタ画面 ===== -->
    <div id="editor-screen">
        <header>
            <button class="hbtn btn-gray" onclick="goHome()">← ホーム</button>
            <div class="tab-container">
                <button class="tab-btn active" id="tab-code" onclick="switchView('code')">コード</button>
                <button class="tab-btn" id="tab-preview" onclick="switchView('preview')">プレビュー</button>
            </div>
            <button class="hbtn btn-green" onclick="saveCurrentProject()">保存</button>
            <button class="hbtn btn-blue" onclick="selectAllCombinedCode()">全選択</button>
        </header>
        <div id="project-title-bar" class="project-title-bar"></div>
        <div class="content">
            <div id="editors-view" class="editors active">
                <textarea id="code"></textarea>
            </div>
            <iframe id="preview-view"></iframe>
        </div>
    </div>

    <!-- ===== アプリ内ダイアログ ===== -->
    <div id="modal-overlay">
        <div class="modal-box">
            <p class="modal-msg" id="modal-msg"></p>
            <input id="modal-input" type="text">
            <div class="modal-btns">
                <button class="hbtn btn-gray" id="modal-cancel">キャンセル</button>
                <button class="hbtn btn-blue" id="modal-ok">OK</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script>
        /* ============================================================
           アプリ内ダイアログ
           ブラウザ標準の alert / confirm / prompt は埋め込み環境で
           ブロックされることがあるため、自前のダイアログを使う。
           （これが「保存できない・ホームに戻れない」原因でした）
        ============================================================ */
        const overlay = document.getElementById('modal-overlay');
        const modalMsg = document.getElementById('modal-msg');
        const modalInput = document.getElementById('modal-input');
        const modalOk = document.getElementById('modal-ok');
        const modalCancel = document.getElementById('modal-cancel');

        function showModal({ message, input = false, defaultValue = '', showCancel = true, okLabel = 'OK', danger = false }) {
            return new Promise((resolve) => {
                modalMsg.textContent = message;
                modalInput.style.display = input ? 'block' : 'none';
                modalInput.value = defaultValue;
                modalCancel.style.display = showCancel ? 'inline-block' : 'none';
                modalOk.textContent = okLabel;
                modalOk.className = 'hbtn ' + (danger ? 'btn-red' : 'btn-blue');
                overlay.classList.add('show');
                if (input) setTimeout(() => modalInput.focus(), 50);

                function cleanup(result) {
                    overlay.classList.remove('show');
                    modalOk.onclick = null;
                    modalCancel.onclick = null;
                    modalInput.onkeydown = null;
                    resolve(result);
                }
                modalOk.onclick = () => cleanup(input ? modalInput.value : true);
                modalCancel.onclick = () => cleanup(input ? null : false);
                modalInput.onkeydown = (e) => { if (e.key === 'Enter') cleanup(modalInput.value); };
            });
        }

        const appAlert   = (msg) => showModal({ message: msg, showCancel: false });
        const appConfirm = (msg, opts = {}) => showModal({ message: msg, ...opts });
        const appPrompt  = (msg, def = '') => showModal({ message: msg, input: true, defaultValue: def });

        /* ============================================================
           保存機能（環境に応じて自動で切り替わる）
           1. Claudeアーティファクト内 → window.storage
           2. 通常のブラウザ → localStorage
           3. どちらも使えない場合 → メモリ内（ページを閉じると消える）
        ============================================================ */
        const memoryStore = {};
        function hasLocalStorage() {
            try {
                const k = '__test__';
                window.localStorage.setItem(k, '1');
                window.localStorage.removeItem(k);
                return true;
            } catch (e) { return false; }
        }
        const storageMode = (typeof window.storage !== 'undefined') ? 'artifact'
                          : hasLocalStorage() ? 'local' : 'memory';

        async function loadProjects() {
            try {
                if (storageMode === 'artifact') {
                    try {
                        const r = await window.storage.get('projects');
                        return r && r.value ? JSON.parse(r.value) : {};
                    } catch (e) { return {}; } // キー未作成の場合
                } else if (storageMode === 'local') {
                    const v = localStorage.getItem('projects');
                    return v ? JSON.parse(v) : {};
                }
                return memoryStore.projects || {};
            } catch (e) { return {}; }
        }

        async function saveProjects(projects) {
            const json = JSON.stringify(projects);
            try {
                if (storageMode === 'artifact') {
                    await window.storage.set('projects', json);
                } else if (storageMode === 'local') {
                    localStorage.setItem('projects', json);
                } else {
                    memoryStore.projects = projects;
                }
                return true;
            } catch (e) {
                await appAlert('保存に失敗しました：' + (e && e.message ? e.message : e));
                return false;
            }
        }

        /* ============================================================
           エディタ本体
        ============================================================ */
        const DEFAULT_CODE = `<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
h1 {
  color: #ff6b6b;
  text-align: center;
  margin-top: 50px;
}
    </style>
</head>
<body>
    <h1 id="title">こんにちは！</h1>
    <script>
const title = document.getElementById('title');
title.addEventListener('click', () => {
  title.style.color = '#4dadf7';
});
    <\/script>
</body>
</html>`;

        const editor = CodeMirror.fromTextArea(document.getElementById('code'), {
            theme: "dracula",
            lineNumbers: true,
            tabSize: 2,
            mode: 'htmlmixed',
            lineWrapping: true
        });

        let currentProjectId = null;   // 開いているプロジェクトのID
        let isDirty = false;           // 未保存の変更があるか

        function runCode() {
            document.getElementById('preview-view').srcdoc = editor.getValue();
        }
        editor.on('change', () => { isDirty = true; runCode(); });

        /* ============================================================
           ホーム画面：一覧表示
        ============================================================ */
        function escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function renderHome() {
            const list = document.getElementById('project-list');
            const projects = await loadProjects();
            const ids = Object.keys(projects).sort((a, b) => projects[b].updatedAt - projects[a].updatedAt);

            if (ids.length === 0) {
                list.innerHTML = '<div class="empty-msg">まだプロジェクトがありません。<br>「＋ 新規作成」から始めましょう！</div>';
                return;
            }

            list.innerHTML = '';
            for (const id of ids) {
                const p = projects[id];
                const card = document.createElement('div');
                card.className = 'project-card';
                const date = new Date(p.updatedAt);
                const dateStr = date.getFullYear() + '/' + (date.getMonth()+1) + '/' + date.getDate()
                    + ' ' + String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0');

                const info = document.createElement('div');
                info.className = 'project-info';
                info.innerHTML = '<p class="project-name">' + escapeHtml(p.name) + '</p>'
                               + '<p class="project-date">更新: ' + dateStr + '</p>';
                info.addEventListener('click', () => openProject(id));

                const actions = document.createElement('div');
                actions.className = 'card-actions';
                const renameBtn = document.createElement('button');
                renameBtn.className = 'hbtn btn-gray';
                renameBtn.textContent = '名前';
                renameBtn.addEventListener('click', () => renameProject(id));
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'hbtn btn-gray';
                deleteBtn.textContent = '削除';
                deleteBtn.addEventListener('click', () => deleteProject(id));
                actions.appendChild(renameBtn);
                actions.appendChild(deleteBtn);

                card.appendChild(info);
                card.appendChild(actions);
                list.appendChild(card);
            }
        }

        /* ============================================================
           プロジェクト操作
        ============================================================ */
        function showEditor() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';
            switchView('code');
            setTimeout(() => editor.refresh(), 0);
        }

        function showHome() {
            document.getElementById('editor-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            renderHome();
        }

        function createNewProject() {
            currentProjectId = null;
            editor.setValue(DEFAULT_CODE);
            isDirty = false;
            document.getElementById('project-title-bar').textContent = '（未保存の新規プロジェクト）';
            showEditor();
            runCode();
        }

        async function openProject(id) {
            const projects = await loadProjects();
            const p = projects[id];
            if (!p) { await appAlert('プロジェクトが見つかりません'); renderHome(); return; }
            currentProjectId = id;
            editor.setValue(p.code);
            isDirty = false;
            document.getElementById('project-title-bar').textContent = '📄 ' + p.name;
            showEditor();
            runCode();
        }

        async function saveCurrentProject() {
            const projects = await loadProjects();
            let name;

            if (currentProjectId && projects[currentProjectId]) {
                name = projects[currentProjectId].name; // 上書き保存
            } else {
                name = await appPrompt('プロジェクト名を入力してください：', '新しいプロジェクト');
                if (name === null) return;              // キャンセル
                name = name.trim() || '無題のプロジェクト';
                currentProjectId = 'p' + Date.now();
            }

            projects[currentProjectId] = {
                name: name,
                code: editor.getValue(),
                updatedAt: Date.now()
            };

            const ok = await saveProjects(projects);
            if (ok) {
                isDirty = false;
                document.getElementById('project-title-bar').textContent = '📄 ' + name;
                await appAlert('「' + name + '」を保存しました！');
            }
        }

        async function renameProject(id) {
            const projects = await loadProjects();
            const p = projects[id];
            if (!p) return;
            const name = await appPrompt('新しい名前を入力してください：', p.name);
            if (name === null) return;
            p.name = name.trim() || p.name;
            await saveProjects(projects);
            renderHome();
        }

        async function deleteProject(id) {
            const projects = await loadProjects();
            const p = projects[id];
            if (!p) return;
            const yes = await appConfirm('「' + p.name + '」を削除しますか？\nこの操作は元に戻せません。', { okLabel: '削除する', danger: true });
            if (!yes) return;
            delete projects[id];
            if (currentProjectId === id) currentProjectId = null;
            await saveProjects(projects);
            renderHome();
        }

        async function goHome() {
            if (isDirty) {
                const yes = await appConfirm('保存していない変更があります。\n保存せずにホームへ戻りますか？', { okLabel: '戻る' });
                if (!yes) return;
            }
            showHome();
        }

        /* ============================================================
           コピー（全選択）機能
        ============================================================ */
        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            ta.setSelectionRange(0, ta.value.length);
            let ok = false;
            try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
            document.body.removeChild(ta);
            return ok;
        }

        async function selectAllCombinedCode() {
            const fullCode = editor.getValue();
            editor.focus();
            editor.execCommand('selectAll');

            let copied = false;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try { await navigator.clipboard.writeText(fullCode); copied = true; } catch (e) {}
            }
            if (!copied) {
                copied = fallbackCopy(fullCode);
                editor.focus();
                editor.execCommand('selectAll');
            }
            await appAlert(copied
                ? 'すべてのコードをクリップボードにコピーしました！'
                : '自動コピーができない環境のため、コードを全選択しました。長押し（またはCtrl+C）でコピーしてください。');
            if (!copied) {
                editor.focus();
                editor.execCommand('selectAll');
            }
        }

        /* ============================================================
           タブ切り替え
        ============================================================ */
        function switchView(viewType) {
            const codeTab = document.getElementById('tab-code');
            const prevTab = document.getElementById('tab-preview');
            const editors = document.getElementById('editors-view');
            const preview = document.getElementById('preview-view');

            if (viewType === 'code') {
                codeTab.classList.add('active');
                prevTab.classList.remove('active');
                editors.classList.add('active');
                preview.classList.remove('active');
                editor.refresh();
            } else {
                codeTab.classList.remove('active');
                prevTab.classList.add('active');
                editors.classList.remove('active');
                preview.classList.add('active');
                runCode();
            }
        }

        // 起動時はホーム画面を表示
        renderHome();
    </script>
</body>
</html>
